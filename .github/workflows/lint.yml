#what is goal of lint.yml
#Goal : linter will check format syntax ,format, identation correct or not
name: Auto linter

on:
  push:
    paths: "*.py"
jobs:
  code:
    runs-on: ubuntu-latest
    steps:
    # this step will automatically clone the code of the current branch into the runner
      - name: Checkout/clone the code
        uses: actions/checkout@v7
    # install python
      - name: Python installation
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
    #This step will install the linting tools
      - name: Install linter
        run: pip install ruff
    #this step will run the linter
      - name: Check the file listing
        run: ruff check .
        
